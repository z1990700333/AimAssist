name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          yes | sdkmanager --install "ndk;27.2.12479018" "cmake;3.22.1" || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Download ncnn Android Vulkan SDK
        run: |
          cd app/src/main/jni
          echo ">>> 下载 ncnn Android Vulkan 预编译库..."
          wget -q https://github.com/Tencent/ncnn/releases/download/20250503/ncnn-20250503-android-vulkan.zip -O ncnn-android-vulkan.zip
          echo ">>> 解压..."
          unzip -q ncnn-android-vulkan.zip
          mv ncnn-20250503-android-vulkan ncnn-20260113-android-vulkan
          echo ">>> ncnn 库结构:"
          ls -la ncnn-20260113-android-vulkan/
          ls -la ncnn-20260113-android-vulkan/arm64-v8a/lib/

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace

      - name: Build Release APK
        run: gradle assembleRelease --stacktrace

      - name: Verify native library
        if: always()
        run: |
          echo "=== 检查 libaimassist.so ==="
          find app/build -name "libaimassist.so" -exec ls -lh {} \; 2>/dev/null || echo "未找到 .so 文件"
          echo ""
          echo "=== 验证 16KB 页面对齐 ==="
          SO_FILE=$(find app/build -name "libaimassist.so" -path "*/arm64-v8a/*" 2>/dev/null | head -1)
          if [ -n "$SO_FILE" ]; then
            readelf -l "$SO_FILE" | grep -A1 "LOAD" || true
          else
            echo "跳过对齐验证 (未找到 .so)"
          fi

      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AimAssist-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AimAssist-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: warn
